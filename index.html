<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Pendências - Radar CTB</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Frame superior com título e filtro -->
        <div class="top-frame">
            <div class="page-title">
                <h1>Acompanhamento de Fechamento</h1>
            </div>
            <div class="filter-section">
                <div class="filter-label">Selecione a Unidade</div>
                <div class="unidades-buttons">
                    <button class="btn-unidade active" data-unidade="SP">São Paulo</button>
                    <button class="btn-unidade" data-unidade="RJ">Rio de Janeiro</button>
                    <button class="btn-unidade" data-unidade="Santos">Santos</button>
                    <button class="btn-unidade" data-unidade="Goias">Goiás</button>
                </div>
            </div>
        </div>

        <!-- Container para os quadros -->
        <div id="dashboards-container"></div>

        <!-- Rodapé com status -->
        <div class="footer">
            <div class="status-message">
                <span class="status-icon">✅</span>
                <span id="statusMessage" class="status-text">Carregando dados...</span>
            </div>
        </div>
    </div>

    <!-- Modal de Detalhes -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Detalhe das Pendências</h2>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Barra de pesquisa -->
                <div class="modal-search-bar">
                    <input type="text" id="modalSearchInput" placeholder="🔍 Pesquisar por cliente, ID, grupo, gerente..." class="search-input">
                    <button id="exportExcelBtn" class="export-btn">📎 Exportar Excel</button>
                </div>
                <div class="table-wrapper">
                    <table id="modalTable">
                        <thead>
                            <tr>
                                <th>CodCliente</th>
                                <th>Razão Social</th>
                                <th>Unidade</th>
                                <th>Regime Tributário</th>
                                <th>Tarefa</th>
                                <th>Responsável</th>
                                <th>Grupo</th>
                                <th>Status Documentação</th>
                            </tr>
                        </thead>
                        <tbody id="modalTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="static/js/dashboard.js"></script>
</body>
</html>
